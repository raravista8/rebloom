name: visual-baselines

# Manually-triggered: (re)generate the Playwright pixel baselines on Linux (the CI
# OS) and commit them to the triggering branch. macOS↔Linux font rendering differs,
# so baselines MUST be generated here, never committed from a dev machine. After this
# runs, the normal `web` CI job diffs against these baselines (≤2%).
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Update visual baselines
        run: npx playwright test --update-snapshots
      - name: Commit baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual || true  # picks up the new *-snapshots/ PNG dirs
          if git diff --cached --quiet; then
            echo "No baseline changes."
          else
            git commit -m "test(web): update visual baselines"
            git push origin HEAD:${{ github.ref_name }}
          fi
