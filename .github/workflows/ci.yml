name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which optional workstreams exist yet (web is scaffolded in E2,
  # infra compose in T0.4) so their jobs only run once present.
  detect:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.f.outputs.web }}
      infra: ${{ steps.f.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - id: f
        run: |
          echo "web=$([ -f web/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "infra=$([ -f infra/docker-compose.yml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Configure in-project venv
        run: poetry config virtualenvs.in-project true
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
      - name: Install deps
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format
        run: poetry run ruff format --check .
      - name: Import boundaries (core ⇏ infrastructure)
        run: poetry run lint-imports
      - name: Mypy (strict)
        run: poetry run mypy --strict app
      - name: Pytest (unit + contract + security subset)
        run: poetry run pytest -m "not e2e and not slow and not integration"
      - name: Bandit (SAST)
        run: poetry run bandit -q -r app
      - name: pip-audit (SCA)
        run: poetry run pip-audit

  # Integration tests against a real Postgres + Redis (money race, etc.).
  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rebloom
          POSTGRES_PASSWORD: rebloom
          POSTGRES_DB: rebloom
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U rebloom" --health-interval 5s
          --health-timeout 3s --health-retries 15
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 15
    env:
      DATABASE_URL: postgresql+psycopg://rebloom:rebloom@localhost:5432/rebloom
      DB_MIGRATOR_URL: postgresql+psycopg://rebloom:rebloom@localhost:5432/rebloom
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pipx install poetry==1.8.3
      - name: Configure in-project venv
        run: poetry config virtualenvs.in-project true
      - name: Install deps
        run: poetry install --no-interaction
      - name: Migrate
        run: poetry run alembic upgrade head
      - name: Pytest (integration)
        run: poetry run pytest -m integration

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          ./gitleaks detect --no-banner --redact --exit-code 1

  web:
    needs: detect
    if: ${{ needs.detect.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm audit --audit-level=high
      - name: Visual regression (pixel-diff vs canon baselines ≤ 2%)
        run: npm run test:visual

  infra:
    needs: detect
    if: ${{ needs.detect.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dev compose
        run: docker compose -f infra/docker-compose.yml config -q
      - name: Validate single-box prod compose
        env:
          PUBLIC_DOMAIN: example.com
          POSTGRES_PASSWORD: ci-validate
        run: |
          touch .env  # env_file is required at deploy; create an empty one to validate
          docker compose -f infra/docker-compose.prod.yml config -q
          rm -f .env
