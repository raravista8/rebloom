# Local dev stack (DEPLOYMENT §2). In prod, Postgres + Redis are MANAGED and
# not in compose (OPERATIONS §1) — this file is the `local` environment.
#
#   make dev   → docker compose --env-file .env -f infra/docker-compose.yml up
#
# Credentials here are non-secret local dev defaults; real secrets live only in
# the VM `.env` / secret-store (SECURITY §6).
name: rebloom

services:
  # ── Postgres 16 primary (writer) ──
  db:
    image: postgres:16
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c listen_addresses=*
    environment:
      POSTGRES_USER: rebloom_app
      POSTGRES_PASSWORD: rebloom
      POSTGRES_DB: rebloom
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebloom_app -d rebloom"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Postgres 16 read-replica (reader, day-1 per MVP decision) ──
  db-replica:
    image: postgres:16
    user: postgres
    depends_on:
      db:
        condition: service_healthy
    environment:
      PRIMARY_HOST: db
      PRIMARY_PORT: "5432"
      REPL_USER: replicator
      PGPASSWORD: replicator_pw
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    command: ["postgres", "-c", "hot_standby=on"]
    volumes:
      - ./scripts/replica-entrypoint.sh:/replica-entrypoint.sh:ro
      - replicadata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebloom_app -d rebloom -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ── Redis (RQ + sessions + counters + pub/sub) ──
  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── API (FastAPI) ──
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://rebloom_app:rebloom@db:5432/rebloom
      DATABASE_REPLICA_URL: postgresql+psycopg://rebloom_app:rebloom@db-replica:5432/rebloom
      DB_MIGRATOR_URL: postgresql+psycopg://rebloom_migrator:rebloom@db:5432/rebloom
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  dbdata:
  replicadata:
